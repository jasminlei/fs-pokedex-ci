name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check deployed /health endpoint
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://fs-pokedex-ci.fly.dev/health
          max-attempts: 3
          retry-delay: 10s
          follow-redirect: true
